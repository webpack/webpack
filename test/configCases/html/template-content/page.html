<!DOCTYPE html>
<html>
<head><title>Template</title></head>
<body>

<template>
	<img src="./image.png" alt="in-template">
	<img srcset="./image.png 480w, ./image.png 800w" alt="in-template-srcset">
	<template>
		<img src="./image.png" alt="nested-template">
	</template>
</template>

<img src="./image.png" alt="outside-template">

</body>
</html>
