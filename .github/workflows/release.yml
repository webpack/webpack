name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.repository == 'webpack/webpack'
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: yarn

      - run: yarn --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: node ./node_modules/.bin/changeset publish
          commit: "chore(release): new release"
          title: "chore(release): new release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: "" # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868

  announce-release:
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/release-announcement.yml
    secrets: inherit

  trigger-documentation-update:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
      - name: Dispatch workflow
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        env:
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.publishedPackages }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES);
            const pkg = packages.find(p => p.name === "webpack");
            if (!pkg) throw new Error("webpack package not found in published packages");

            await github.rest.actions.createWorkflowDispatch({
              owner: "webpack",
              repo: "webpack-doc-kit",
              workflow_id: "release.yml",
              ref: "main",
              inputs: {
                tag: "v" + pkg.version,
              },
            });
